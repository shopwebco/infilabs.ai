name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xenon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/xenon_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/xenon_test?schema=public
      AUTH_SECRET: ci-test-secret-not-for-production-use-only
      APP_URL: http://localhost:3000
      # Non-secret placeholders so the Stripe SDK constructs for OFFLINE
      # webhook-signature/idempotency tests (no live API calls in CI).
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_test_signing_secret
      STRIPE_PRICE_PRO: price_ci_pro
      STRIPE_PRICE_AGENCY: price_ci_agency
      STRIPE_PRICE_AGENCY_CLIENT: price_ci_agency_client
      STRIPE_CONNECT_WEBHOOK_SECRET: whsec_ci_connect_test_signing_secret
      CRON_SECRET: ci-cron-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit / integration tests
        run: npm run test
